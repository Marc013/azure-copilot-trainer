<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
  rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
<script>
  (function () {
    var storageKey = "azure-training-site-theme";
    var storedTheme = null;

    try {
      storedTheme = window.localStorage.getItem(storageKey);
    } catch (error) {
      storedTheme = null;
    }

    var theme = storedTheme === "dark" || storedTheme === "light"
      ? storedTheme
      : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");

    document.documentElement.setAttribute("data-theme", theme);

    function applyTheme(nextTheme) {
      document.documentElement.setAttribute("data-theme", nextTheme);

      try {
        window.localStorage.setItem(storageKey, nextTheme);
      } catch (error) {
        // Ignore storage failures and still apply the theme for this session.
      }

      var button = document.querySelector(".theme-toggle");
      if (!button) {
        return;
      }

      var isDark = nextTheme === "dark";
      button.setAttribute("aria-label", isDark ? "Switch to light mode" : "Switch to dark mode");
      button.setAttribute("title", isDark ? "Switch to light mode" : "Switch to dark mode");
      button.querySelector(".theme-toggle-icon").textContent = isDark ? "◐" : "☀";
      button.querySelector(".theme-toggle-text").textContent = isDark ? "Dark mode" : "Light mode";
    }

    function mountToggle() {
      if (document.querySelector(".theme-toggle") || !document.body) {
        return;
      }

      var button = document.createElement("button");
      button.type = "button";
      button.className = "theme-toggle";
      button.innerHTML = '<span class="theme-toggle-icon" aria-hidden="true">☀</span><span class="theme-toggle-text">Light mode</span>';
      button.addEventListener("click", function () {
        var currentTheme = document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
        applyTheme(currentTheme === "dark" ? "light" : "dark");
      });
      document.body.appendChild(button);
      applyTheme(document.documentElement.getAttribute("data-theme") || theme);
    }

    document.addEventListener("DOMContentLoaded", mountToggle);
  })();
</script>
<style>
  body {
    font-family: "IBM Plex Sans", system-ui, sans-serif;
  }

  .site-title,
  .main-content h1,
  .main-content h2,
  .main-content h3,
  .main-content h4 {
    font-family: "Space Grotesk", "IBM Plex Sans", system-ui, sans-serif;
  }

  .theme-toggle {
    position: fixed;
    right: 1.25rem;
    bottom: 1.25rem;
    z-index: 999;
    display: inline-flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.8rem 1rem;
    border: 1px solid rgba(9, 61, 111, 0.14);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.92);
    color: #091a2a;
    box-shadow: 0 18px 40px rgba(4, 27, 50, 0.18);
    backdrop-filter: blur(12px);
    cursor: pointer;
    font: 700 0.95rem "IBM Plex Sans", system-ui, sans-serif;
  }

  .theme-toggle-icon {
    display: inline-grid;
    place-items: center;
    width: 1.8rem;
    height: 1.8rem;
    border-radius: 50%;
    background: rgba(13, 106, 191, 0.12);
    color: #0a4f91;
  }

  html[data-theme="dark"] .theme-toggle {
    border-color: rgba(163, 212, 255, 0.16);
    background: rgba(10, 20, 36, 0.94);
    color: #eef8ff;
    box-shadow: 0 18px 40px rgba(0, 0, 0, 0.34);
  }

  html[data-theme="dark"] .theme-toggle-icon {
    background: rgba(97, 184, 255, 0.14);
    color: #b9e0ff;
  }

  @media (max-width: 640px) {
    .theme-toggle {
      right: 0.8rem;
      bottom: 0.8rem;
      padding: 0.75rem 0.9rem;
    }
  }
</style>
